<div class="card-container">

    <div class="answer">{{Mặt sau}}</div>

    <div class="typing">
        {{type:Mặt trước}}
    </div>

    <div class="custom-input">
        <input id="myInput" placeholder="Nhập..." />
        <button id="submitBtn">Submit</button>

        <div id="result"></div>
        <div id="hint"></div>
    </div>

</div>

<script>
    (function () {

        const SHOW_ANSWER_THRESHOLD = 3;

        const raw = `{{Mặt trước}}`;
        const cardKey = encodeURIComponent(raw);

        let fail = 0;

        function normalize(s) {
            return s.toLowerCase().replace(/\s+/g, "");
        }

        function parseAnswers(str) {
            return str.split(";").map(x => {
                const [jp, romaji] = x.split("/");
                return (romaji || jp).trim();
            });
        }

        const answers = parseAnswers(raw);

        function isCorrect(input) {
            const parts = input.split(";").map(x => normalize(x)).filter(Boolean);
            if (parts.length !== answers.length) return false;
            return parts.every((p, i) => p === normalize(answers[i]));
        }

        function generateMask(user, correct) {
            const u = normalize(user);
            const c = normalize(correct);

            let result = "";

            for (let i = 0; i < c.length; i++) {
                if (u[i] === c[i]) {
                    result += `<span class="correct">${correct[i]}</span>`;
                }
                else if (u.includes(c[i])) {
                    result += `<span class="partial">${correct[i]}</span>`;
                }
                else {
                    result += `<span class="missing">_</span>`;
                }
            }

            return result;
        }

        function saveStats(fail) {
            let stats = JSON.parse(localStorage.getItem("cardStats") || "{}");

            if (!stats[cardKey]) {
                stats[cardKey] = { attempts: [] };
            }

            stats[cardKey].attempts.push(fail);

            localStorage.setItem("cardStats", JSON.stringify(stats));
            localStorage.setItem("currentFail", fail);
        }

        const input = document.getElementById("myInput");
        const result = document.getElementById("result");
        const hint = document.getElementById("hint");

        function handle() {

            const userInput = input.value;

            if (isCorrect(userInput)) {
                result.innerHTML = "✅ PASS";
                saveStats(fail);
                fail = 0;
                hint.innerHTML = "";
            } else {
                result.innerHTML = "❌ NOT PASS";
                fail++;

                let html = "";

                answers.forEach((ans, i) => {
                    html += generateMask(userInput.split(";")[i] || "", ans) + "<br>";
                });

                if (fail >= SHOW_ANSWER_THRESHOLD) {
                    hint.innerHTML = `
          <div style="color:#22c55e;font-weight:bold">
            💡 ${answers.join("; ")}
          </div>
          <div style="font-size:13px;opacity:0.7">
            Nhập lại để nhớ nhé
          </div>
        `;
                } else {
                    hint.innerHTML = html;
                }

                input.focus();
                input.select();
            }
        }

        document.getElementById("submitBtn").onclick = handle;
        input.addEventListener("keydown", e => {
            if (e.key === "Enter") handle();
        });

    })();
</script>
