<div class="card-container">

    <!-- Hiển thị đáp án (ẩn/hiện tùy logic Anki) -->
    <div class="answer">{{Mặt sau}}</div>

    <!-- Typing của Anki -->
    <div class="typing">
        {{type:Mặt trước}}
    </div>

    <!-- Input custom -->
    <div class="custom-input">
        <input id="myInput" placeholder="Nhập..." />

        <div id="result"></div>
        <div id="hint"></div>

        <button id="submitBtn">Submit</button>
        <button id="showBtn">Gợi ý</button>
    </div>

</div>

<script>
    (function () {

        // số lần sai để hiển thị đáp án
        const SHOW_ANSWER_THRESHOLD = 10;
        /* =========================
           🛡️ SAFE DATA (tránh vỡ JS)
           - remove xuống dòng
           - encode key để lưu localStorage
        ========================= */
        const raw = `{{Mặt trước}}`.replace(/\n/g, " ");
        if (!raw) return;

        const cardKey = encodeURIComponent(raw);

        let fail = 0;
        // đánh dấu lần nhập đầu tiên
        let isFirst = true;
        // đánh dấu đã show đáp án để lần sau sẽ show luôn
        let isShowingAnswer = false;

        /* =========================
           🔤 NORMALIZE
           - lower case
           - bỏ khoảng trắng
        ========================= */
        function normalize(s) {
            return s.toLowerCase().replace(/\s+/g, "");
        }

        /* =========================
           📚 PARSE ANSWERS
           format:
           食べる/taberu; 飲む/nomu
           hoặc
           食べる; 飲む
        ========================= */
        function parseAnswers(str) {
            return str.split(";").map(x => {
                const parts = x.split("/");
                return parts.length > 1
                    ? parts[1].trim()
                    : parts[0].trim();
            });
        }

        const answers = parseAnswers(raw);

        /* =========================
           ✅ CHECK ĐÁP ÁN (không cần đúng thứ tự)
        ========================= */
        function isCorrect(input) {

            const parts = input.split(";")
                .map(x => normalize(x)) // normalize = bỏ space
                .filter(Boolean);

            if (parts.length !== answers.length) return false;

            const sortedInput = [...parts].sort();
            const sortedAnswers = answers.map(a => normalize(a)).sort();

            return sortedInput.every((p, i) => p === sortedAnswers[i]);
        }

        /* =========================
           🧩 GỢI Ý TỪNG CHỮ
        ========================= */
        function generateMask(user, correct) {

            const u = normalize(user); // vd: "ha"
            const chars = new Set(u.split("")); // {h, a}

            let result = "";

            for (let ch of correct) {

                // giữ khoảng trắng
                if (ch === " ") {
                    result += " ";
                    continue;
                }

                // nếu ký tự nằm trong user input → hiện
                if (chars.has(normalize(ch))) {
                    result += `<span class="correct">${ch}</span>`;
                } else {
                    result += `<span class="missing">_</span>`;
                }
            }

            return result;
        }

        function splitUserByCorrect(user, correct) {

            const u = normalize(user);
            const words = correct.trim().split(/\s+/);

            let result = [];
            let pointer = 0;

            words.forEach(w => {

                let chunk = "";
                let i = 0;

                while (pointer < u.length && i < w.length) {
                    chunk += u[pointer];
                    pointer++;
                    i++;
                }

                result.push(chunk);
            });

            // 🔥 phần dư (không cắt nữa)
            if (pointer < u.length) {
                result[result.length - 1] += u.slice(pointer);
            }

            return result;
        }

        function countErrors(user, correct) {
            if (isNoSpaceMatch(user, correct)) return 0;

            const uw = splitUserByCorrect(user, correct);
            const cw = correct.trim().split(/\s+/);

            let total = 0;

            cw.forEach((w, i) => {
                total += countErrorsChar(uw[i] || "", w);
            });

            return total;
        }

        function countErrorsChar(user, correct) {

            const u = normalize(user);
            const c = normalize(correct);

            const m = u.length;
            const n = c.length;

            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (u[i - 1] === c[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }

            const lcs = dp[m][n];

            return (m - lcs) + (n - lcs);
        }

        /* =========================
           💾 SAVE STATS
        ========================= */
        function saveStats(value, err = "") {
            // lấy dữ liệu cũ
            let stats = JSON.parse(localStorage.getItem("cardStats") || "{}");

            // nếu chưa có dữ liệu cho card này thì khởi tạo
            if (!stats[cardKey]) {
                // attempts: mảng lưu số lần sai của mỗi lần học
                // messageError: mảng lưu lỗi sai
                stats[cardKey] = { attempts: [], messageError: [] };
            }

            // lưu dữ liệu mới
            // nếu có lỗi thì lưu vào messageError, ngược lại lưu số lần sai vào attempts
            if (err) {
                stats[cardKey].messageError.push(err);
            }
            else {
                stats[cardKey].attempts.push(value);
            }

            localStorage.setItem("cardStats", JSON.stringify(stats));
        }

        const input = document.getElementById("myInput");
        const result = document.getElementById("result");
        const hint = document.getElementById("hint");

        /* =========================
           🎯 HANDLE SUBMIT
        ========================= */
        function handle() {
            const userInput = input.value;

            // nếu input rỗng → cảnh báo và không xử lý tiếp
            if (!userInput.trim()) {
                hint.innerHTML = "⚠️ Vui lòng nhập đáp án";
                input.focus();
                return;
            }

            if (isCorrect(userInput)) {
                result.innerHTML = "✅ PASS";
                
                // chỉ lưu nếu sai hoặc lần đầu (để có dữ liệu cải thiện)
                if (fail > 0 || isFirst) {
                    saveStats(fail, "");
                }

                // reset
                fail = 0;
                // sau lần nhập đầu tiên, các lần sau sẽ không còn là "lần đầu" nữa
                isFirst = false;
                // ẩn gợi ý
                hint.innerHTML = "";

                // focus vào nút submit để lần sau nhấn Enter sẽ dễ dàng submit tiếp
                document.getElementById("submitBtn").focus();
            } else {
                // đánh dấu không phải lần đầu nếu đã nhập sai ít nhất 1 lần
                isFirst = false;
                result.innerHTML = "❌ NOT PASS";
                // tăng số lần sai
                fail++;

                let html = "";
                let totalError = 0;

                const userParts = userInput.split(";");

                answers.forEach(ans => {

                    let bestMatch = "";
                    let bestScore = -1;

                    userParts.forEach(p => {
                        let score = similarity(normalize(p), normalize(ans));
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = p;
                        }
                    });

                    const user = bestMatch || "";

                    totalError += countErrors(user, ans);
                    html += generateMask(user, ans) + "<br>";
                });

                if (fail >= SHOW_ANSWER_THRESHOLD) {
                    hint.innerHTML = `
                    <div class="answer-hint">
                        💡 ${answers.join("; ")}
                    </div>
                    <div class="hint-sub">
                        Nhập lại để nhớ nhé
                    </div>
                `;
                } else {
                    hint.innerHTML = html;
                }

                // reset input
                input.value = "";
                input.focus();
                input.select();

                // lưu lỗi vào messageError để cải thiện gợi ý sau này
                saveStats(fail, `Tôi nhập là ${userInput} gợi ý là ${html.replace(/<span class="correct">/g, "").replace(/<\/span>/g, "").replace(/<span class="missing">/g, "")}`);
            }
            
            if (isShowingAnswer) {
                // lưu lỗi vào messageError để cải thiện gợi ý sau này
                saveStats(fail, `Tôi đã quên từ này hãy giúp tôi nhớ`);
                // reset lại trạng thái đã show đáp án để lần sau sẽ không show nữa
                isShowingAnswer = false;
            }
        }

        function isNoSpaceMatch(user, correct) {
            return normalize(user) === normalize(correct);
        }

        function similarity(a, b) {
            let match = 0;
            const len = Math.min(a.length, b.length);

            for (let i = 0; i < len; i++) {
                if (a[i] === b[i]) match++;
            }

            return match;
        }

        document.getElementById("submitBtn").onclick = handle;
        // gợi ý sẽ hiển thị đáp án và tăng số lần sai lên để lần sau sẽ show luôn đáp án
        document.getElementById("showBtn").onclick = () => {
            // hiển thị đáp án
            hint.innerHTML = `
                <div class="answer-hint">
                    💡 ${answers.join("; ")}
                </div>
            `;
            isShowingAnswer = true;
            // tăng số lần sai lên để lần sau sẽ show luôn đáp án
            fail += SHOW_ANSWER_THRESHOLD;

            // reset input
            input.value = "";
            input.focus();
            input.select();
        };
        input.addEventListener("keydown", e => { if (e.key === "Enter") handle(); });
        input.addEventListener("focus", () => input.select());
        setTimeout(() => { input.focus(); input.select(); }, 100);

    })();
</script>
