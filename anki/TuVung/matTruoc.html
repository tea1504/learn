<div class="card-container">

    <!-- Hiển thị đáp án (ẩn/hiện tùy logic Anki) -->
    <div class="answer">{{Mặt sau}}</div>

    <!-- Typing của Anki -->
    <div class="typing">
        {{type:Mặt trước}}
    </div>

    <!-- Input custom -->
    <div class="custom-input">
        <input id="myInput" placeholder="Nhập..." />
        <button id="submitBtn">Submit</button>

        <div id="result"></div>
        <div id="hint"></div>
    </div>

</div>

<script>
    (function () {

        /* =========================
           ⚙️ CONFIG
        ========================= */
        const SHOW_ANSWER_THRESHOLD = 10; // sai >= 10 lần thì show đáp án

        /* =========================
           🛡️ SAFE DATA (tránh vỡ JS)
           - remove xuống dòng
           - encode key để lưu localStorage
        ========================= */
        const raw = `{{Mặt trước}}`.replace(/\n/g, " ");
        if (!raw) return;

        const cardKey = encodeURIComponent(raw);

        let fail = 0;

        /* =========================
           🔤 NORMALIZE
           - lower case
           - bỏ khoảng trắng
        ========================= */
        function normalize(s) {
            return s.toLowerCase().replace(/\s+/g, "");
        }

        /* =========================
           📚 PARSE ANSWERS
           format:
           食べる/taberu; 飲む/nomu
           hoặc
           食べる; 飲む
        ========================= */
        function parseAnswers(str) {
            return str.split(";").map(x => {
                const parts = x.split("/");
                return parts.length > 1
                    ? parts[1].trim()
                    : parts[0].trim();
            });
        }

        const answers = parseAnswers(raw);

        /* =========================
           ✅ CHECK ĐÁP ÁN (không cần đúng thứ tự)
        ========================= */
        function isCorrect(input) {
            const parts = input.split(";")
                .map(x => normalize(x))
                .filter(Boolean);

            if (parts.length !== answers.length) return false;

            const sortedInput = [...parts].sort();
            const sortedAnswers = answers.map(a => normalize(a)).sort();

            return sortedInput.every((p, i) => p === sortedAnswers[i]);
        }

        /* =========================
           🧩 GỢI Ý TỪNG CHỮ
        ========================= */
        function generateMask(user, correct) {
            const u = normalize(user);
            const c = normalize(correct);

            let result = "";
            let i = 0;
            let j = 0;

            while (i < c.length && j < u.length) {

                // ✅ đúng
                if (u[j] === c[i]) {
                    let chunk = "";

                    while (i < c.length && j < u.length && u[j] === c[i]) {
                        chunk += c[i];
                        i++;
                        j++;
                    }

                    result += `<span class="correct">${chunk}</span>`;
                    continue;
                }

                // ❗ thử skip nhiều ký tự (thiếu)
                let found = false;
                for (let k = i + 1; k < c.length; k++) {
                    if (u[j] === c[k]) {
                        for (let m = i; m < k; m++) {
                            result += `<span class="missing">_</span>`;
                        }
                        i = k;
                        found = true;
                        break;
                    }
                }
                if (found) continue;

                // ❗ dư ký tự
                while (j < u.length && u[j] !== c[i]) {
                    result += `<span class="wrong">${u[j]}</span>`;
                    j++;
                }
                continue;

                // ❗ thiếu 1 ký tự
                if (i + 1 < c.length && u[j] === c[i + 1]) {
                    result += `<span class="missing">_</span>`;
                    i++;
                    continue;
                }

                // ❗ sai thật
                result += `<span class="wrong">${u[j]}</span>`;
                i++;
                j++;
            }

            // ❗ còn thiếu ở cuối
            while (i < c.length) {
                result += `<span class="missing">_</span>`;
                i++;
            }

            // ❗ còn dư ở cuối
            while (j < u.length) {
                result += `<span class="wrong">${u[j]}</span>`;
                j++;
            }

            return result;
        }
        /* =========================
           💾 SAVE STATS
           - giới hạn 50 lần để tránh phình bộ nhớ
        ========================= */
        function saveStats(fail) {
            let stats = JSON.parse(localStorage.getItem("cardStats") || "{}");

            if (!stats[cardKey]) {
                stats[cardKey] = { attempts: [] };
            }

            stats[cardKey].attempts.push(fail);

            if (stats[cardKey].attempts.length > 50) {
                stats[cardKey].attempts.shift();
            }

            localStorage.setItem("cardStats", JSON.stringify(stats));
        }

        const input = document.getElementById("myInput");
        const result = document.getElementById("result");
        const hint = document.getElementById("hint");

        /* =========================
           🎯 HANDLE SUBMIT
        ========================= */
        function handle() {

            const userInput = input.value;

            if (isCorrect(userInput)) {
                result.innerHTML = "✅ PASS";

                saveStats(fail);

                fail = 0;
                hint.innerHTML = "";
            } else {
                result.innerHTML = "❌ NOT PASS";
                fail++;

                let html = "";

                const userParts = userInput.split(";");

                answers.forEach(ans => {

                    let bestMatch = "";
                    let bestScore = -1;

                    userParts.forEach(p => {
                        let score = similarity(normalize(p), normalize(ans));
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = p;
                        }
                    });

                    html += generateMask(bestMatch || "", ans) + "<br>";
                });

                if (fail >= SHOW_ANSWER_THRESHOLD) {
                    hint.innerHTML = `
                    <div class="answer-hint">
                        💡 ${answers.join("; ")}
                    </div>
                    <div class="hint-sub">
                        Nhập lại để nhớ nhé
                    </div>
                `;
                } else {
                    hint.innerHTML = html;
                }

                input.focus();
                input.select();
            }
        }

        function similarity(a, b) {
            let match = 0;
            const len = Math.min(a.length, b.length);

            for (let i = 0; i < len; i++) {
                if (a[i] === b[i]) match++;
            }

            return match;
        }

        document.getElementById("submitBtn").onclick = handle;
        input.addEventListener("keydown", e => { if (e.key === "Enter") handle(); });
        input.addEventListener("focus", () => input.select());
        setTimeout(() => { input.focus(); input.select(); }, 100);

    })();
</script>
